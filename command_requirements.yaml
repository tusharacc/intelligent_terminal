    - names:
      - -f
      - --function
      description: Treat each NAME as a shell function
    - names:
      - -v
      - --variable
      description: Treat each NAME as a shell variable
    - names:
      - -n
      - --name-reference
      description: Treat each NAME as a name reference and unset the variable itself rather than the variable it references
  alias:
    total_flags: 1
    flags:
    - names:
      - -p
      description: print all defined aliases in a reusable format
  history:
    total_flags: 8
    flags:
    - names:
      - -c
      description: clear the history list by deleting all of the entries
    - names:
      - -d
      - --offset
      description: delete the history entry at position OFFSET. Negative offsets count back from the end of the history list
    - names:
      - -a
      description: append history lines from this session to the history file
    - names:
      - -n
      description: read all history lines not already read from the history file and append them to the history list
    - names:
      - -r
      description: read the history file and append the contents to the history list
    - names:
      - -w
      description: write the current history to the history file
    - names:
      - -p
      - --ps
      description: perform history expansion on each ARG and display the result without storing it in the history list
    - names:
      - -s
      description: append the ARGs to the history list as a single entry
