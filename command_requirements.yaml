commands:
  pwd:
    total_flags: 4
    flags:
    - names:
      - -L
      - --logical
      description: use PWD from environment, even if it contains symlinks
    - names:
      - -P
      - --physical
      description: avoid all symlinks
    - names:
      - --help
      description: display this help and exit
    - names:
      - --version
      description: output version information and exit
  cd:
    total_flags: 4
    flags:
    - names:
      - -L
      - --follow-symlinks
      description: 'Force symbolic links to be followed: resolve symbolic links in DIR after processing instances of `..'''
    - names:
      - -P
      - --physical-directory
      description: 'Use the physical directory structure without following symbolic links: resolve symbolic links in DIR before
        processing instances of `..'''
    - names:
      - -e
      description: If the -P option is supplied, and the current working directory cannot be determined successfully, exit
        with a non-zero status
    - names:
      - -@
      - --extended-attributes
      description: On systems that support it, present a file with extended attributes as a directory containing the file
        attributes
  echo:
    total_flags: 5
    flags:
    - names:
      - -n
      - --no-trailing-newline
      description: Do not output the trailing newline
    - names:
      - -e
      - --enable-backslash-escapes
      description: Enable interpretation of backslash escapes
    - names:
      - -E
      - --disable-backslash-escapes
      description: Disable interpretation of backslash escapes (default)
    - names:
      - --help
      description: Display this help and exit
    - names:
      - --version
      description: Output version information and exit
  env:
