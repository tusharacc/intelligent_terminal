    - names:
      - -R
      - --rfc-email
      description: 'output date and time in RFC 5322 format. Example: Mon, 14 Aug 2006 02:34:56 -0600'
    - names:
      - --rfc-3339=FMT
      description: 'output date/time in RFC 3339 format. FMT=''date'', ''seconds'', or ''ns'' for date and time to the indicated
        precision. Example: 2006-08-14 02:34:56-06:00'
    - names:
      - -r
      - --reference=FILE
      description: display the last modification time of FILE
    - names:
      - -s
      - --set=STRING
      description: set time described by STRING
    - names:
      - -u
      - --utc
      - --universal
