<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intelligent Terminal</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #1e1e1e; /* Match terminal background */
        overflow: hidden;
      }
      #terminal-container {
        width: 100%;
        height: 100%;
        padding: 5px;
        box-sizing: border-box;
      }
      /* Prevent xterm scrollbar from moving layout */
      .xterm .xterm-viewport {
        overflow-y: auto !important;
      }
    </style>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div id="terminal-container"></div>
  </body>
</html>
